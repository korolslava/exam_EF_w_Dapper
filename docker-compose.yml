services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bookstore_sqlserver
    environment:
      SA_PASSWORD: "Bookstore@Strong1"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Bookstore@Strong1", "-Q", "SELECT 1", "-C"]
      interval: 10s
      retries: 10
      start_period: 30s

  app:
    build:
      context: ./BookstoreManagement
      dockerfile: Dockerfile
    container_name: bookstore_app
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=BookShopDb;User Id=sa;Password=Bookstore@Strong1;TrustServerCertificate=True;"

volumes:
  sqlserver_data: